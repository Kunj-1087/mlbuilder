services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mlbuilder
      POSTGRES_PASSWORD: mlbuilder_dev_password
      POSTGRES_DB: mlbuilder
    volumes:
      - mlbuilder_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlbuilder -d mlbuilder"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  mlbuilder_postgres_data:
