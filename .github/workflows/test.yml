name: MLBuilder CI Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Unit and E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mlbuilder
          POSTGRES_PASSWORD: mlbuilder_dev_password
          POSTGRES_DB: mlbuilder_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://mlbuilder:mlbuilder_dev_password@localhost:5433/mlbuilder_test?schema=public"
      TEST_DATABASE_URL: "postgresql://mlbuilder:mlbuilder_dev_password@localhost:5433/mlbuilder_test?schema=public"
      NEXTAUTH_SECRET: "test_nextauth_secret_longer_key_32_bytes_longer"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      RESEND_API_KEY: "re_mock_test_key"
      NEXT_PUBLIC_POSTHOG_KEY: "phc_mock_test_key"
      NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Align Prisma Database Schema
        run: npx prisma db push --accept-data-loss --skip-generate

      - name: Run Vitest Unit Tests
        run: npm run test:unit

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: npm run test:e2e

      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
