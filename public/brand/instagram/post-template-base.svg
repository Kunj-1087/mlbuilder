<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="100%" height="100%">
  <defs>
    <!-- Graph-paper grid pattern -->
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#111111" stroke-width="1.5" opacity="0.08" />
    </pattern>
    
    <!-- Reusable Play Decor Icon -->
    <g id="play-decor">
      <circle cx="20" cy="20" r="19" stroke="#111111" stroke-width="2" fill="none" />
      <path d="M 17 13 L 27 20 L 17 27 Z" fill="#111111" />
    </g>
  </defs>

  <!-- Cream Background -->
  <rect width="1080" height="1350" fill="#F5F1E6" />
  <!-- Grid overlay -->
  <rect width="1080" height="1350" fill="url(#grid)" />

  <!-- Top Brand Bar -->
  <g transform="translate(60, 60)">
    <!-- Node/Network Mark -->
    <g transform="scale(0.1)">
      <path d="M 120 100 L 40 100 L 40 280 L 220 280 L 220 230" stroke="#4F7CFF" stroke-width="24" fill="none" stroke-linejoin="miter" stroke-linecap="square" />
      <path d="M 200 220 L 280 220 L 280 40 L 100 40 L 100 90" stroke="#111111" stroke-width="24" fill="none" stroke-linejoin="miter" stroke-linecap="square" />
      <line x1="100" y1="220" x2="130" y2="150" stroke="#4F7CFF" stroke-width="8" />
      <line x1="100" y1="220" x2="200" y2="190" stroke="#4F7CFF" stroke-width="8" />
      <line x1="210" y1="110" x2="130" y2="150" stroke="#111111" stroke-width="8" />
      <line x1="210" y1="110" x2="200" y2="190" stroke="#111111" stroke-width="8" />
      <line x1="130" y1="150" x2="200" y2="190" stroke="#111111" stroke-width="8" />
      <circle cx="210" cy="110" r="18" fill="#4F7CFF" />
      <circle cx="100" cy="220" r="18" fill="#4F7CFF" />
      <circle cx="130" cy="150" r="18" fill="#111111" />
      <circle cx="200" cy="190" r="18" fill="#111111" />
    </g>
    <!-- Text -->
    <text x="44" y="24" font-family="'Archivo Black', 'Arial Black', sans-serif" font-size="28" font-weight="900" letter-spacing="-0.02em">
      <tspan fill="#4F7CFF">ML</tspan><tspan fill="#111111">BUILDER</tspan>
    </text>
  </g>

  <!-- Bottom Bar Layout -->
  <line x1="60" y1="1240" x2="1020" y2="1240" stroke="#111111" stroke-width="2" opacity="0.15" />
  <text x="60" y="1285" font-family="'Inter', sans-serif" font-size="22" font-weight="700" fill="#4F7CFF" letter-spacing="0.05em">BUILD SOLO. SHARE OPENLY.</text>
  <text x="1020" y="1285" text-anchor="end" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#111111" opacity="0.6">@mlbuilder.py</text>

  <!-- Scattered Play Icons (background decoration) -->
  <use href="#play-decor" x="120" y="240" opacity="0.15" transform="scale(1.4)" />
  <use href="#play-decor" x="850" y="320" opacity="0.12" transform="scale(1.2)" />
  <use href="#play-decor" x="180" y="750" opacity="0.15" transform="scale(1.3)" />
  <use href="#play-decor" x="780" y="820" opacity="0.1" transform="scale(1.4)" />
</svg>
