<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1754" width="100%" height="100%">
  <defs>
    <!-- Faint grid pattern overlay -->
    <pattern id="cover-grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#F5F1E6" stroke-width="1.5" opacity="0.04" />
    </pattern>
  </defs>

  <!-- Deep Navy Background -->
  <rect width="1240" height="1754" fill="#1B2A4E" />
  <!-- Grid overlay -->
  <rect width="1240" height="1754" fill="url(#cover-grid)" />

  <!-- Massive Display Title (Editable placeholder) -->
  <text x="100" y="380" font-family="'Archivo Black', 'Arial Black', sans-serif" font-size="96" font-weight="900" fill="#F5F1E6" letter-spacing="-0.02em">
    <tspan x="100" dy="0">DRAFTING</tspan>
    <tspan x="100" dy="110">THE SYSTEM</tspan>
    <tspan x="100" dy="110">ARCHITECT</tspan>
  </text>

  <!-- Subtitle Tagline (Caveat script font) -->
  <text x="100" y="740" font-family="'Caveat', cursive" font-size="52" font-weight="700" fill="#cf5c36">A Step-by-Step AI Automation Blueprint</text>

  <!-- Bottom Brand Mark -->
  <g transform="translate(100, 1550)">
    <!-- Node/Network Mark -->
    <g transform="scale(0.15)">
      <path d="M 120 100 L 40 100 L 40 280 L 220 280 L 220 230" stroke="#cf5c36" stroke-width="24" fill="none" stroke-linejoin="miter" stroke-linecap="square" />
      <path d="M 200 220 L 280 220 L 280 40 L 100 40 L 100 90" stroke="#F5F1E6" stroke-width="24" fill="none" stroke-linejoin="miter" stroke-linecap="square" />
      <line x1="100" y1="220" x2="130" y2="150" stroke="#cf5c36" stroke-width="8" />
      <line x1="100" y1="220" x2="200" y2="190" stroke="#cf5c36" stroke-width="8" />
      <line x1="210" y1="110" x2="130" y2="150" stroke="#F5F1E6" stroke-width="8" />
      <line x1="210" y1="110" x2="200" y2="190" stroke="#F5F1E6" stroke-width="8" />
      <line x1="130" y1="150" x2="200" y2="190" stroke="#F5F1E6" stroke-width="8" />
      <circle cx="210" cy="110" r="18" fill="#cf5c36" />
      <circle cx="100" cy="220" r="18" fill="#cf5c36" />
      <circle cx="130" cy="150" r="18" fill="#F5F1E6" />
      <circle cx="200" cy="190" r="18" fill="#F5F1E6" />
    </g>
    <!-- Text -->
    <text x="64" y="34" font-family="'Archivo Black', 'Arial Black', sans-serif" font-size="40" font-weight="900" letter-spacing="-0.02em">
      <tspan fill="#cf5c36">ML</tspan><tspan fill="#F5F1E6">BUILDER</tspan>
    </text>
  </g>

  <!-- Bottom Right Free Tag -->
  <g transform="translate(940, 1550)">
    <rect width="200" height="54" rx="27" fill="#cf5c36" stroke="#F5F1E6" stroke-width="2.5" />
    <text x="100" y="34" text-anchor="middle" font-family="'Archivo Black', 'Arial Black', sans-serif" font-size="20" font-weight="900" fill="#111111">FREE PDF</text>
  </g>
</svg>
